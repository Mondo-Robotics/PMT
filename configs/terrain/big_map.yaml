# axis: terrain  (PMT plan §2, §7)
# The mocaphouse "big map" mesh that the terrain-anchored walk/dance clips were
# optimized onto (scripts/motion_adapter/assets/g1/g1_29dof_big_map.stl). The
# walk_dance optimized clips bake their dx/dy/dyaw transform into body_pos_w, so
# the robot roots directly onto this mesh (verified: body_pos_w[0,pelvis,:2]
# matches the clip's dx/dy). Reuses the stepping-stone scene geometry (height-scan
# grid + contact sensor) from PMTSteppingStoneEnvCfg.
type: stepping_stone
mesh_path: ${paths.TERRAIN_ASSET_DIR}/g1_29dof_big_map.stl
