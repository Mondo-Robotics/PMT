# axis: network  (PMT plan §2/§4 — name == registered class_name for ckpt compat)
# compat_name DERIVED via registry.NETWORK_COMPAT
# (@register_network("PerceptiveMotionTokenTracker", compat_name="perceptive_motion_token_tracker")).
name: PerceptiveMotionTokenTracker
# PMT-pretrain (pmt_only_mode) hyperparams — the actual policy cfg is built by
# pmt_tasks.agent_cfgs.perceptive_motion_token (the values below mirror it; the
# builder uses the agent cfg, this YAML is the composition-axis selector).
future_motion_len: 21
num_motion_tokens: 4
motion_token_dim: 64
model_dim: 128
token_num_heads: 4
history_embedding_dim: 128
# from-scratch gate knobs (no pretrained PMT ckpt needed).
pmt_only_mode: true
freeze_pmt: false
require_pmt_checkpoint: false
require_height_scan: false
adapter_mode: no_adapter
