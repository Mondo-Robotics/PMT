# axis: motion  (PMT plan §2, §7 source: mdp/multi_motion_command.py)
# Eager multi-clip tracking (V2 core) on the FLAT plane for ADD. Per §3a the control
# rate is part of the motion axis: ADD flat clips run at the terrain-flat default
# (dec=4 / dt=0.005).
command_class: MultiMotionCommandV2
# Default local multi-motion clip dir (CHECKED to exist). The ADD task may override.
motion_files: ${paths.MOTION_ROOT}/debug/robot_lafan1
terrain_motion_files: null
sampler: bin_adaptive
storage_mode: eager
chunk_length: 4000
# Per-motion control rate (§3a dt-from-motion). ADD flat = dec=4 / dt=0.005.
decimation: 4
sim_dt: 0.005
