config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  PMT_DATA_ROOT: "<WHOLE_BODY_TRACKING_REPO>"
  PMT_MOTION_ROOT: "<CLUSTER_DATA_ROOT>/motions"
  PMT_DATASET_ROOT: "<CLUSTER_DATA_ROOT>"
  PMT_SONIC_ROOT: "<CLUSTER_DATA_ROOT>/sonic"
  PMT_CKPT_ROOT: "<CLUSTER_WORKSPACE>/PMT/logs/rsl_rl"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# BFM-Zero (FB-CPR-Aux off-policy) validation on the flat plane + lafan1 clips.
# SELF-CONTAINED: the FB-CPR-Aux agent/networks are VENDORED under
# motion_tracking_rl/bfm_zero/_vendor/ (no external BFM-Zero repo / humanoidverse needed).
# SINGLE-GPU (no DDP); off-policy args (NOT --max_iterations); dedicated launcher via runpy.
tasks:
  - name: BFM-Zero-Flat-MultiMotionV2-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/bfm_zero/train.py"
    args: ["--task", "BFM-Zero-Flat-MultiMotionV2-G1-v0", "--agent_preset", "full", "--num_envs", "8192", "--total_env_steps", "200000000", "--num_seed_steps", "10240", "--update_agent_every", "1024", "--num_agent_updates", "16", "--batch_size", "1024", "--seed", "42", "--headless", "--work_dir", "logs/rsl_rl/val_bfm_zero_flat"]
