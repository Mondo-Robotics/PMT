config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU smoke for the blind transformer teacher on stepping-stone terrain.
# Motion (cluster) resolves to
#   .../motions/terrain_positive_stepping_stone_with_stairs/walk1_subject1_stair/optimized
# VERIFIED present on NAS (1000 npz). Mesh positive_stepping_with_stairs.stl exists.
tasks:
  - name: PMT-SteppingStone-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-SteppingStone-G1-v0", "--num_envs", "16", "--max_iterations", "3", "--experiment_name", "pmt_smoke_pmt_stepping_stone", "--run_name", "smoke-1gpu", "--seed", "42", "--headless"]
