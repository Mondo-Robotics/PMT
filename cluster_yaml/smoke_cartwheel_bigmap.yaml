config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU smoke for the NEW cartwheel teacher task: prove PMT-CartwheelBigMap-G1-v0
# discovers the ~500 weight500 cartwheel clips, builds the transformer teacher,
# trains 3 iters, saves a checkpoint. Same transformer stack as walk_dance_bigmap.
tasks:
  - name: PMT-CartwheelBigMap-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-CartwheelBigMap-G1-v0", "--num_envs", "16", "--max_iterations", "3", "--headless", "--seed", "42", "--experiment_name", "pmt_smoke_cartwheel_bigmap", "--run_name", "smoke-1gpu"]
