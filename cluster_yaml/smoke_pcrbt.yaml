config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU smoke for P-CaRBT (PerceptiveResidualBehaviorTokenTracker): FSQ behavior-token
# tracker, PPO pretrain FROM SCRATCH (pmt_only_mode, no PMT ckpt) on the FLAT plane with
# lafan1 clips (cluster-resolved .../sonic/lafan1/robot_lafan1, 40 clips). Validates the
# FSQ tokenizer + aux losses (fsq_usage_entropy + motion_recon) run end-to-end.
tasks:
  - name: PMT-PCaRBT-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-PCaRBT-G1-v0", "--num_envs", "16", "--max_iterations", "5", "--experiment_name", "pmt_smoke_pcrbt", "--run_name", "smoke-1gpu", "--seed", "42", "--headless"]
