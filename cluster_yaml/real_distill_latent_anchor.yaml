config_version: 1
cluster: huoshan

num_gpus: 4

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# REAL latent-anchor distillation (4 GPU, 10k iters, distributed). Blind TransformerActorCritic
# teacher (model_9999.pt, reward 82.33) -> vision-transformer student (VisionStudentTeacher) on the
# stepping-stone terrain with paired optimized/raw clips. DAgger-style teacher-mix anneal
# 1.0 -> 0.0 over the first 100 iters. Per-GPU num_envs = 4096.
tasks:
  - name: PMT-Distill-SteppingStone-LatentAnchor-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-Distill-SteppingStone-LatentAnchor-G1-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_real_distill_latent_anchor", "--run_name", "4gpu-10k", "--seed", "42", "--headless"]
