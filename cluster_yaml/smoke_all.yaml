config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU end-to-end smoke: proves the PMT entry (scripts/submit/train_pmt.py via
# runpy.run_path), the cluster paths.yaml profile, and the Ray plumbing all work.
# Uses the walk_dance_bigmap terrain task whose mesh + 500-clip motion dir BOTH exist
# on the NAS (verified-resolvable cluster paths).
tasks:
  - name: PMT-WalkDanceBigMap-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-WalkDanceBigMap-G1-v0", "--num_envs", "8", "--max_iterations", "2", "--experiment_name", "pmt_smoke_walk_dance_bigmap", "--run_name", "smoke-1gpu", "--seed", "42", "--headless"]
