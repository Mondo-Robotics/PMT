config_version: 1
cluster: huoshan

num_gpus: 16

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"
  NCCL_DEBUG: "WARN"

# P-CaRBT on the LARGE 100style flat dataset (810 robot clips), 16 GPUs x 4096 env =
# 65536 envs. RESUME from the lafan1-trained model_9999.pt (same obs/network signature).
# 16 GPUs spans 2+ nodes on this cluster; NCCL_DEBUG set for cross-node diagnostics.
tasks:
  - name: PMT-PCaRBT-100style-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-PCaRBT-100style-G1-v0", "--num_envs", "4096", "--max_iterations", "20000", "--distributed", "true", "--experiment_name", "pmt_pcrbt_flat_100style", "--run_name", "16gpu-resume", "--resume", "--load_task", "pmt_pcrbt_flat", "--load_run", "2026-06-27_17-46-54_4gpu-4096env", "--checkpoint", "model_9999.pt", "--seed", "42", "--headless"]
