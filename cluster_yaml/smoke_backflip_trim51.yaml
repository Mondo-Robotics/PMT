config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU smoke for the REPOINTED backflip teacher: prove PMT-Backflip-G1-v0 now
# discovers the ~33 curated success clips (terrain_mocaphouse/backflip_success_trim51/
# optimized), builds, trains 3 iters, saves a checkpoint. dec=10/dt=0.002 big_map.
tasks:
  - name: PMT-Backflip-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-Backflip-G1-v0", "--num_envs", "16", "--max_iterations", "3", "--headless", "--seed", "42", "--experiment_name", "pmt_smoke_backflip_trim51", "--run_name", "smoke-1gpu"]
