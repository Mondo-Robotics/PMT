config_version: 1
cluster: huoshan

num_gpus: 8

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# Class-A+B mixed training: ONE shared transformer policy on a mixture of
# terrain-anchored clips (big-map mesh) + flat clips (shifted to the (90,0,0) flat patch)
# via the flexible UnifiedMultiMotionCommand (per-clip origin + noise).
# mesh:    .../whole_body_tracking/g1_29dof_big_map_with_flat.stl                 (exists)
# terrain: .../motions/terrain_mocaphouse/walk_dance1sub1start/optimized          (exists)
# flat:    .../sonic/lafan1/robot_lafan1                                          (exists)
# --num_envs PER-GPU -> 4096 * 8 = 32768 total.
tasks:
  - name: PMT-TerrainFlatMix-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-TerrainFlatMix-G1-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_terrain_flat_mix", "--run_name", "8gpu-4096env", "--seed", "42", "--headless"]
