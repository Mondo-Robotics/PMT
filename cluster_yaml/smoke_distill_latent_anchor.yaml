config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# REAL-TEACHER distillation smoke (1 GPU, 3 iters). Distills the BLIND TransformerActorCritic
# teacher (pmt_stepping_stone/2026-06-23_14-20-03_8gpu-4096env/model_9999.pt, reward 82.33)
# into the vision-transformer student via the DistillationRunner + VisionStudentTeacher wrapper.
# The named teacher ckpt resolves through configs/checkpoints/ss_teacher.yaml ->
# ${paths.CKPT_ROOT}/... (cluster CKPT_ROOT = .../PMT/logs/rsl_rl). Paired optimized/raw
# stepping-stone clips (walk1_subject1_stair, 1000 npz each) + positive_stepping_with_stairs.stl.
#
# Confirm in the logs: DistillationRunner dispatched (not OnPolicyRunner); teacher LOADED
# ("Loaded TransformerActorCritic teacher checkpoint" / teacher_loaded=True); 3 iters run; a
# checkpoint saved. This is meaningful distillation against a real trained teacher.
tasks:
  - name: PMT-Distill-SteppingStone-LatentAnchor-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-Distill-SteppingStone-LatentAnchor-G1-v0", "--num_envs", "16", "--max_iterations", "3", "--experiment_name", "pmt_smoke_distill_latent_anchor", "--run_name", "smoke-1gpu", "--seed", "42", "--headless"]
