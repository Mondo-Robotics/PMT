config_version: 1
cluster: huoshan

num_gpus: 8

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# REAL backflip TEACHER: full 722-clip back_flip_merged/optimized on the big_map STL
# mesh (user-confirmed 2026-06-25). The earlier ~8.5 plateau was NOT a data problem —
# it was the full-XYZ ee_body_pos termination firing on ~90% of episodes the instant the
# flip swings the end-effectors horizontally. backflip.py now (a) runs on the big_map mesh
# (terrain-anchored clips) and (b) overrides ee_body_pos to the Z-ONLY check, so the merged
# set can actually learn the flip. dec=10/dt=0.002, reward backflip (knee_negative_power).
# 8 GPU * 4096 = 32768 envs.
tasks:
  - name: PMT-Backflip-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-Backflip-G1-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_backflip_teacher_merged_zonly", "--run_name", "8gpu-10k", "--seed", "42", "--headless"]
