config_version: 1
cluster: huoshan

num_gpus: 12

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# REAL blind transformer TEACHER on the mocaphouse big_map terrain + the
# terrain-anchored cartwheel optimized clips (cartwheel_bigmap_n100_full_weight500,
# 500 CLEAN clips). Same proven transformer stack as walk_dance_bigmap (mesh g1_29dof_big_map).
# 12 GPU * 4096 = 49152 envs.
tasks:
  - name: PMT-CartwheelBigMap-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-CartwheelBigMap-G1-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_cartwheel_bigmap", "--run_name", "12gpu-10k", "--seed", "42", "--headless"]
