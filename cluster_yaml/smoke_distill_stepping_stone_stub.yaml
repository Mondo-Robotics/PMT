config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"
  # Build env + StudentTeacher policy, dump the shape-matching teacher MLP stub, exit.
  PMT_DUMP_TEACHER_STUB: "<CLUSTER_WORKSPACE>/PMT/logs/rsl_rl/_stub/stepping_stone_teacher_stub.pt"

# Phase A of the distill smoke: dump a random-init teacher stub whose actor.* keys
# match the [1024,512,256,128] teacher MLP shape, so Phase B can load it (the
# DistillationRunner refuses to run without a loaded teacher).
tasks:
  - name: PMT-Distill-SteppingStone-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-Distill-SteppingStone-G1-v0", "--num_envs", "16", "--max_iterations", "3", "--experiment_name", "pmt_smoke_distill_stub", "--run_name", "stub-1gpu", "--seed", "42", "--headless"]
