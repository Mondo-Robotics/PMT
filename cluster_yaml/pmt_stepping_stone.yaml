config_version: 1
cluster: huoshan

num_gpus: 8

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# Class-A terrain training: blind transformer teacher on the stepping-stone
# terrain (mesh exists on NAS: .../whole_body_tracking/positive_stepping_with_stairs.stl).
#
# *** DATA-GATED ***: the motion dir resolves (cluster) to
#   .../motions/terrain_positive_stepping_stone_with_stairs/walk1_subject1_stair/optimized
# which is NOT yet present on the NAS (only terrain_mocaphouse/walk_dance* is uploaded).
# Upload the stepping-stone optimized clips to that path before submitting, or this job
# will fail at motion discovery. See cluster_yaml/README.md.
tasks:
  - name: PMT-SteppingStone-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-SteppingStone-G1-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_stepping_stone", "--run_name", "8gpu-4096env", "--seed", "42", "--headless"]
