config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"
  CUDA_LAUNCH_BLOCKING: "1"
  TORCH_USE_CUDA_DSA: "1"

# 1-GPU smoke for the terrain_flat_mix CUDA device-side assert fix.
# CUDA_LAUNCH_BLOCKING + TORCH_USE_CUDA_DSA make any assert report the TRUE line.
tasks:
  - name: PMT-TerrainFlatMix-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-TerrainFlatMix-G1-v0", "--num_envs", "16", "--max_iterations", "2", "--experiment_name", "pmt_tfm_smoke", "--run_name", "tfm-1gpu", "--seed", "42", "--headless"]
