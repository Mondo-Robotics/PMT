config_version: 1
cluster: huoshan

num_gpus: 4

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"
  # Make the streaming working-set SWAP actually fire (every 50 PPO updates) so the
  # streaming path is exercised, not just built. 100style = 1620 clips, max_working_set=256.
  PMT_MOTION_RESAMPLE_FREQ: "50"

# Streaming validation on the LARGE 100style set (1620 clips, max_working_set=256 << total
# -> resident set swaps during training). REAL full training (10k iters, 4 GPU).
tasks:
  - name: PMT-G1-MultiMotionV2-Streaming-100style-Flat-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-G1-MultiMotionV2-Streaming-100style-Flat-v0", "--num_envs", "4096", "--max_iterations", "10000", "--distributed", "true", "--experiment_name", "pmt_real_streaming", "--run_name", "4gpu-10k-100style", "--seed", "42", "--headless"]
