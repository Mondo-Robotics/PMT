config_version: 1
cluster: huoshan

num_gpus: 1

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"

# 1-GPU smoke: prove PMT-G1-BPO-MultiMotionV2-Flat-v0 builds + trains a few iters + saves a checkpoint.
tasks:
  - name: PMT-G1-BPO-MultiMotionV2-Flat-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-G1-BPO-MultiMotionV2-Flat-v0", "--num_envs", "16", "--max_iterations", "3", "--headless", "--seed", "42", "--experiment_name", "pmt_smoke_bpo", "--run_name", "smoke-1gpu"]
