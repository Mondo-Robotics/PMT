config_version: 1
cluster: huoshan

num_gpus: 2

shared_workspace: "<CLUSTER_WORKSPACE>/PMT"
pip_packages: ["tensordict", "wandb", "hydra-core", "omegaconf"]
pip_directories: []
py_modules: []
py_paths: ["<CLUSTER_WORKSPACE>/PMT"]
log_folder: "logs"
os_env_vars:
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  PMT_PROFILE: "cluster"
  WHOLE_BODY_TRACKING_ASSET_DIR: "<WHOLE_BODY_TRACKING_REPO>/source/whole_body_tracking/whole_body_tracking/assets"
  OMNI_KIT_ACCEPT_EULA: "YES"
  NCCL_DEBUG: "WARN"
  # Set PMT_DEBUG_DIST: "1" to dump RANK/WORLD_SIZE/LOCAL_RANK/CUDA_VISIBLE_DEVICES per worker.

# 2-GPU multi-GPU smoke: proves the distributed/device handling works under Ray's
# DataParallelTrainer (which pre-initializes the torch process group). On this cluster
# all GPUs are visible to every worker (CUDA_VISIBLE_DEVICES=0,1) and LOCAL_RANK is the
# true per-node GPU index, so each worker runs on cuda:{LOCAL_RANK}.
tasks:
  - name: PMT-WalkDanceBigMap-G1-v0
    type: "md_rl.train"
    entry_module: "<CLUSTER_WORKSPACE>/PMT/scripts/submit/train_pmt.py"
    args: ["--task", "PMT-WalkDanceBigMap-G1-v0", "--num_envs", "64", "--max_iterations", "3", "--distributed", "true", "--experiment_name", "pmt_2gpu_smoke", "--run_name", "2gpu", "--seed", "42", "--headless"]
